name: Generate & Render Publication List

on:
  push:
    branches:
      - main
    paths:
      - "publication-list.csv"
      - "generate_publication_bib_list.py"
      - "publication-list.qmd"
      - "global-ecology-and-biogeography.csl"
      - ".github/workflows/render-publications.yml"
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # To install LaTeX to build PDF book 
          tinytex: true 
          # uncomment below and fill to pin a version
          # version: SPECIFIC-QUARTO-VERSION-HERE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mistune pandas bibtexparser requests PyYAML

        
      - name: install pandoc
        run: |
          sudo apt install pandoc

      - name: Generate .bib file
        run: |
          python generate_publication_bib_list.py

      - name: Render publication list and add publication headers
        run: |
          echo "step skipped for now"
          #quarto render publication-list.qmd --to html --output-dir site
          #python add_pub_headers.py site/publication-list.html
          #mv site/publication-list.html site/index.html

      # - name: Deploy to GitHub Pages
        # uses: peaceiris/actions-gh-pages@v3
        # with:
          # github_token: ${{ secrets.GITHUB_TOKEN }}
          # publish_branch: gh-pages
          # publish_dir: site
          # commit_message: "publish: updated publication list"

      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this secret is always available for github actions
