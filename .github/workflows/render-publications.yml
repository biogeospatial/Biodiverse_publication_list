name: Generate & Render Publication List

on:
  push:
    branches:
      - main
    paths:
      - "publication-list.csv"
      - "fetch_bib.py"
      - "build_qmd.py"
      - "publication-list.qmd"
      - "global-ecology-and-biogeography.csl"
      - ".github/workflows/render-publications.yml"
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # To install LaTeX to build PDF book 
          tinytex: true 
          # uncomment below and fill to pin a version
          # version: SPECIFIC-QUARTO-VERSION-HERE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mistune pandas bibtexparser requests PyYAML

        
      - name: install pandoc
        run: |
          sudo apt install pandoc

      - name: Fetch and generate .bib file
        run: |
          python fetch_bib.py

      - name: Build per-year qmd chapters and update _quarto.yml
        run: |
          python build_qmd.py

      - name: Render book
        run: |
          quarto render

      - name: Add publication headers
        run: |
          python3 add_pub_headers.py docs/all_publications.html

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
