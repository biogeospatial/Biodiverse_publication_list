project:
  type: book
  output-dir: docs

# https://quarto.org/docs/reference/projects/books.html

book:
  title: "Biodiverse publications"
  author: "Shawn W Laffan"
  date: "2026-04-17"
  chapters:
    - index.qmd
    - 2025.qmd
    - 2024.qmd
    - 2023.qmd
    - 2022.qmd
    - 2021.qmd
    - 2020.qmd
    - 2019.qmd
    - 2018.qmd
    - 2017.qmd
    - 2016.qmd
    - 2015.qmd
    - 2014.qmd
    - 2013.qmd
    - 2012.qmd
    - 2011.qmd
    - 2010.qmd
  output-file: "Biodiverse-publications"
  downloads: [pdf]

format:
  html:
    theme: zephyr
    toc: true
    toc-depth: 3
    toc-expand: true
    #toc-location: left
    number-sections: false
    #number-depth: 2
    link-external-newwindow: true
  pdf:
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 2

# bibliography: references.bib
editor: source

#filters:
#  - section-bibliographies
